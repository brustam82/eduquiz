<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Test yuklash</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Segoe UI',Roboto,sans-serif;background:#FFF9F0;color:#1A2E2A;padding:16px}
.wrap{max-width:460px;margin:0 auto}
h1{font-size:1.3rem;color:#1B7A6B;margin-bottom:4px}
.sub{color:#7C8B86;font-size:.9rem;margin-bottom:18px}
.drop{border:2px dashed #C9B98E;border-radius:14px;background:#fff;padding:26px 16px;text-align:center;cursor:pointer;margin-bottom:14px}
.drop.on{border-color:#1B7A6B;background:#F1F8F5}
.drop .ic{font-size:38px}
.drop b{display:block;font-size:15px;margin-top:6px}
.drop span{font-size:12.5px;color:#7C8B86}
.file{display:none;align-items:center;gap:10px;background:#fff;border:1px solid #EEE6D5;border-radius:11px;padding:10px 12px;margin-bottom:14px;font-size:13px}
.file.on{display:flex}
label{display:block;font-size:13px;font-weight:600;color:#4A5A55;margin:12px 0 5px}
input[type=text],select{width:100%;padding:11px 13px;border:1.5px solid #E6DFCF;border-radius:10px;font-size:15px;font-family:inherit;background:#fff;outline:none}
.btn{width:100%;border:0;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;background:#1B7A6B;color:#fff;margin-top:16px}
.btn:disabled{opacity:.5}
.msg{margin-top:14px;padding:13px;border-radius:11px;font-size:14px;display:none}
.msg.ok{display:block;background:#E8F3F0;color:#12564C;border:1px solid #B7E0D4}
.msg.err{display:block;background:#FCECEA;color:#A32D2D;border:1px solid #F0C0BB}
.spin{width:16px;height:16px;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:s .7s linear infinite;display:inline-block;vertical-align:-2px;margin-right:6px}
@keyframes s{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">
  <h1>Test yuklash</h1>
  <p class="sub">Fayl yuklang — platforma savollarga aylantiradi</p>

  <div class="drop" id="drop" onclick="fi.click()">
    <div class="ic">☁️</div>
    <b>Faylni tanlang yoki tashlang</b>
    <span>PDF · rasm (JPG/PNG) · matn</span>
  </div>
  <input type="file" id="fi" accept=".pdf,.png,.jpg,.jpeg,.txt" style="display:none" onchange="pick()">

  <div class="file" id="fbox"><span>📄</span><span id="fname" style="flex:1"></span><span>✓</span></div>

  <label>Paket nomi</label>
  <input type="text" id="ptitle" placeholder="Masalan: Kimyo, 3-bob">

  <label>Til</label>
  <select id="lang">
    <option value="uz">O'zbekcha</option>
    <option value="ru">Ruscha</option>
    <option value="en">Inglizcha</option>
  </select>

  <button class="btn" id="go" onclick="upload()" disabled>Tanib olish</button>
  <div class="msg" id="msg"></div>
</div>

<script>
var tg=window.Telegram&&window.Telegram.WebApp;
if(tg&&tg.initData){tg.ready();tg.expand()}
var TOKEN='';try{TOKEN=localStorage.getItem('eq_token')||''}catch(e){}
var fi=document.getElementById('fi'),file=null;
var drop=document.getElementById('drop');
['dragover','dragleave','drop'].forEach(function(ev){drop.addEventListener(ev,function(e){e.preventDefault();drop.classList.toggle('on',ev==='dragover');if(ev==='drop'&&e.dataTransfer.files[0]){fi.files=e.dataTransfer.files;pick()}})});
function pick(){file=fi.files[0];if(!file)return;
  document.getElementById('fname').textContent=file.name;
  document.getElementById('fbox').classList.add('on');
  document.getElementById('go').disabled=false}
function msg(t,ok){var m=document.getElementById('msg');m.textContent=t;m.className='msg '+(ok?'ok':'err')}
async function upload(){
  if(!file)return;
  if(!TOKEN){msg("Avval o'qituvchi sifatida kiring",false);return}
  var b=document.getElementById('go');b.disabled=true;b.innerHTML='<span class="spin"></span>Tanilmoqda...';
  var fd=new FormData();
  fd.append('file',file);fd.append('token',TOKEN);
  fd.append('lang',document.getElementById('lang').value);
  fd.append('pack_title',document.getElementById('ptitle').value.trim());
  try{
    var r=await fetch('/api/ingest',{method:'POST',body:fd});
    var j=await r.json();
    if(j.ok){msg('✅ '+j.inserted+" ta savol tanildi. Endi tekshirib tasdiqlang.",true)}
    else{msg('Xato: '+(j.detail||j.hint||j.error||'qayta urining'),false)}
  }catch(e){msg("Internet xatosi. Qayta urining.",false)}
  b.disabled=false;b.textContent='Tanib olish'
}
</script>
</body>
</html>
