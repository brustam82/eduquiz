<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MuallimTest — Test yuklash</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --teal:#2E8B8B;--teal-d:#1F6B6B;--teal-bg:#E8F4F4;
  --gold:#C2913F;--gold-bg:#FAF3E4;
  --ink:#3D3428;--ink-2:#1F4E6B;--muted:#8A7B60;
  --bg:#FBF6EC;--card:#fff;--bd:#E3D8C2;
  --danger:#B3453A;--danger-bg:#FBEDEB;
}
body{font-family:'Inter',-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--ink)}
.girih{height:26px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:center;overflow:hidden;background:var(--bg)}
.wrap{max-width:520px;margin:0 auto;padding:18px 16px 40px}
.brand{font-size:1.35rem;font-weight:700;color:var(--ink-2);letter-spacing:-.3px}
.brand span{color:var(--gold)}
.nav{display:flex;gap:7px;margin:12px 0 18px;flex-wrap:wrap}
.nav a{font-size:12.5px;text-decoration:none;padding:7px 13px;border-radius:9px;background:var(--card);border:1px solid var(--bd);color:var(--ink-2)}
.nav a.on{background:var(--teal);color:#fff;border-color:var(--teal)}
h1{font-size:1.15rem;color:var(--ink-2);margin-bottom:3px}
.sub{color:var(--muted);font-size:.88rem;margin-bottom:18px}
.drop{border:2px dashed var(--bd);border-radius:14px;background:var(--card);padding:26px 16px;text-align:center;cursor:pointer;transition:.15s}
.drop:hover,.drop.on{border-color:var(--teal);background:var(--teal-bg)}
.drop b{display:block;font-size:14.5px;margin-top:8px;color:var(--ink)}
.drop span{font-size:12px;color:var(--muted)}
.ic{font-size:30px;color:var(--teal)}
.file{display:none;align-items:center;gap:10px;background:var(--card);border:1px solid var(--bd);border-radius:11px;padding:10px 12px;margin-top:12px;font-size:13px}
.file.on{display:flex}
label{display:block;font-size:12.5px;font-weight:600;color:var(--ink-2);margin:14px 0 6px}
input[type=text],select{width:100%;padding:11px 13px;border:1px solid var(--bd);border-radius:10px;font-size:14.5px;font-family:inherit;background:var(--card);color:var(--ink);outline:none}
input:focus,select:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(46,139,139,.12)}
.btn{width:100%;border:0;border-radius:11px;padding:13px;font-size:14.5px;font-weight:600;cursor:pointer;font-family:inherit;background:var(--teal);color:#fff;margin-top:18px}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn.gold{background:var(--gold)}
.msg{margin-top:14px;padding:12px 14px;border-radius:11px;font-size:13.5px;display:none;line-height:1.5}
.msg.ok{display:block;background:var(--teal-bg);color:var(--teal-d);border:1px solid #BFE0E0}
.msg.err{display:block;background:var(--danger-bg);color:var(--danger);border:1px solid #EDC9C4}
.spin{width:15px;height:15px;border:2.5px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:s .7s linear infinite;display:inline-block;vertical-align:-2px;margin-right:7px}
@keyframes s{to{transform:rotate(360deg)}}
.packs{margin-top:26px;border-top:1px solid var(--bd);padding-top:18px}
.packs h2{font-size:.95rem;color:var(--ink-2);margin-bottom:10px}
.prow{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--bd);border-radius:11px;padding:10px 12px;margin-bottom:8px}
.prow .nm{flex:1;font-size:13.5px;color:var(--ink)}
.prow .ct{font-size:11.5px;color:var(--muted)}
.del{border:1px solid #EDC9C4;background:#fff;color:var(--danger);border-radius:8px;padding:6px 10px;font-size:12px;cursor:pointer;font-family:inherit}
.del:hover{background:var(--danger-bg)}
.empty{color:var(--muted);font-size:13px;padding:10px 2px}
</style>
</head>
<body>
<div class="girih">
<svg width="440" height="16" viewBox="0 0 440 16" aria-hidden="true"><g stroke="#C2913F" stroke-width=".8" fill="none"><path d="M0 8 L8 0 L16 8 L8 16 Z M16 8 L24 0 L32 8 L24 16 Z M32 8 L40 0 L48 8 L40 16 Z M48 8 L56 0 L64 8 L56 16 Z M64 8 L72 0 L80 8 L72 16 Z M80 8 L88 0 L96 8 L88 16 Z M96 8 L104 0 L112 8 L104 16 Z M112 8 L120 0 L128 8 L120 16 Z M128 8 L136 0 L144 8 L136 16 Z M144 8 L152 0 L160 8 L152 16 Z M160 8 L168 0 L176 8 L168 16 Z M176 8 L184 0 L192 8 L184 16 Z M192 8 L200 0 L208 8 L200 16 Z M208 8 L216 0 L224 8 L216 16 Z M224 8 L232 0 L240 8 L232 16 Z M240 8 L248 0 L256 8 L248 16 Z M256 8 L264 0 L272 8 L264 16 Z M272 8 L280 0 L288 8 L280 16 Z M288 8 L296 0 L304 8 L296 16 Z M304 8 L312 0 L320 8 L312 16 Z M320 8 L328 0 L336 8 L328 16 Z M336 8 L344 0 L352 8 L344 16 Z M352 8 L360 0 L368 8 L360 16 Z M368 8 L376 0 L384 8 L376 16 Z M384 8 L392 0 L400 8 L392 16 Z M400 8 L408 0 L416 8 L408 16 Z M416 8 L424 0 L432 8 L424 16 Z"/></g></svg>
</div>

<div class="wrap">
  <div class="brand">Muallim<span>Test</span></div>
  <div class="nav">
    <a href="/">Bosh sahifa</a>
    <a href="/upload" class="on">Yuklash</a>
    <a href="/review">Tekshirish</a>
  </div>

  <h1>Test yuklash</h1>
  <p class="sub">Material yuklang — platforma savollarga aylantiradi</p>

  <div class="drop" id="drop" onclick="fi.click()">
    <div class="ic">⬆</div>
    <b>Faylni tanlang yoki tashlang</b>
    <span>PDF · rasm (JPG/PNG) · matn · 1-2 ta fayl</span>
  </div>
  <input type="file" id="fi" accept=".pdf,.png,.jpg,.jpeg,.txt" multiple style="display:none" onchange="pick()">
  <div class="file" id="fbox"><span>📄</span><span id="fname" style="flex:1"></span><span style="color:var(--teal)">✓</span></div>

  <label>Paket</label>
  <select id="ptarget" onchange="togglePack()">
    <option value="">➕ Yangi paket yaratish</option>
  </select>

  <div id="newpack">
    <label>Yangi paket nomi</label>
    <input type="text" id="ptitle" placeholder="Masalan: Kimyo, 3-bob">
  </div>

  <label>Til</label>
  <select id="lang">
    <option value="uz">O'zbekcha</option>
    <option value="ru">Ruscha</option>
    <option value="en">Inglizcha</option>
  </select>

  <button class="btn" id="go" onclick="upload()" disabled>Tanib olish</button>
  <a href="/review" id="toReview" style="display:none;text-decoration:none"><button class="btn gold">Tekshirishga o'tish →</button></a>
  <div class="msg" id="msg"></div>

  <div class="packs">
    <h2>Mening paketlarim</h2>
    <div id="plist"><div class="empty">Yuklanmoqda…</div></div>
  </div>
</div>

<script>
var tg=window.Telegram&&window.Telegram.WebApp;if(tg&&tg.initData){tg.ready();tg.expand()}
var TOKEN='';try{TOKEN=localStorage.getItem('eq_token')||''}catch(e){}
var fi=document.getElementById('fi'),file=null;
var drop=document.getElementById('drop');
['dragover','dragleave','drop'].forEach(function(ev){drop.addEventListener(ev,function(e){e.preventDefault();drop.classList.toggle('on',ev==='dragover');if(ev==='drop'&&e.dataTransfer.files.length){fi.files=e.dataTransfer.files;pick()}})});

function pick(){if(!fi.files.length)return;file=fi.files;
  document.getElementById('fname').textContent=fi.files.length>1?(fi.files.length+" ta fayl"):fi.files[0].name;
  document.getElementById('fbox').classList.add('on');
  document.getElementById('go').disabled=false}

function togglePack(){
  var v=document.getElementById('ptarget').value;
  document.getElementById('newpack').style.display=v?'none':'block';
}
function msg(t,ok){var m=document.getElementById('msg');m.textContent=t;m.className='msg '+(ok?'ok':'err')}

async function api(p,b){var r=await fetch(p,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(Object.assign({token:TOKEN},b))});return r.json()}

async function loadPacks(){
  var box=document.getElementById('plist'),sel=document.getElementById('ptarget');
  try{
    var j=await api('/api/packs',{});
    if(!j.ok||!j.packs.length){box.innerHTML='<div class="empty">Hozircha paket yo\'q</div>';return}
    sel.innerHTML='<option value="">➕ Yangi paket yaratish</option>';
    box.innerHTML='';
    j.packs.forEach(function(p){
      var o=document.createElement('option');o.value=p.id;o.textContent='📁 '+p.title;sel.appendChild(o);
      var d=document.createElement('div');d.className='prow';
      d.innerHTML='<div style="flex:1"><div class="nm">'+esc(p.title)+'</div><div class="ct">'+p.approved+' tasdiqlangan · '+p.draft+' qoralama</div></div>';
      var b=document.createElement('button');b.className='del';b.textContent='O\'chirish';
      b.onclick=function(){delPack(p.id,p.title,d)};
      d.appendChild(b);box.appendChild(d);
    });
  }catch(e){box.innerHTML='<div class="empty">Yuklab bo\'lmadi</div>'}
}

async function delPack(id,title,row){
  if(!confirm('"'+title+'" paketi va undagi barcha savollar o\'chiriladi. Davom etamizmi?'))return;
  var j=await api('/api/pack-delete',{pack_id:id});
  if(j.ok){row.remove();loadPacks()}else{msg("O'chirib bo'lmadi",false)}
}

async function upload(){
  if(!file)return;
  if(!TOKEN){msg("Avval o'qituvchi sifatida kiring",false);return}
  var b=document.getElementById('go');b.disabled=true;b.innerHTML='<span class="spin"></span>Tanilmoqda...';
  var fd=new FormData();
  for(var i=0;i<file.length;i++)fd.append('file',file[i]);
  fd.append('token',TOKEN);
  fd.append('lang',document.getElementById('lang').value);
  var target=document.getElementById('ptarget').value;
  if(target)fd.append('pack_id',target);
  else fd.append('pack_title',document.getElementById('ptitle').value.trim());
  try{
    var r=await fetch('/api/ingest',{method:'POST',body:fd});
    var j=await r.json();
    if(j.ok){msg('✅ '+j.inserted+" ta savol tanildi. Endi tekshirib tasdiqlang.",true);
      document.getElementById('toReview').style.display='block';loadPacks()}
    else{msg('Xato: '+(j.detail||j.hint||j.error||'qayta urining'),false)}
  }catch(e){msg("Internet xatosi. Qayta urining.",false)}
  b.disabled=false;b.textContent='Tanib olish'
}
function esc(s){return String(s==null?'':s).replace(/</g,'&lt;')}
loadPacks();
</script>
</body>
</html>
