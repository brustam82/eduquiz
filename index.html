<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduQuiz — Bilim Platformasi</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0c29;
    --card: rgba(255,255,255,0.06);
    --card-border: rgba(255,255,255,0.12);
    --accent1: #a78bfa;
    --accent2: #38bdf8;
    --accent3: #fb7185;
    --accent4: #34d399;
    --gold: #fbbf24;
    --text: #f1f5f9;
    --muted: rgba(241,245,249,0.5);
    --radius: 20px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    color: var(--text);
    overflow-x: hidden;
  }

  /* ── Animated background blobs ── */
  .bg-blobs {
    position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
  }
  .blob {
    position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.35;
    animation: blobFloat 8s ease-in-out infinite alternate;
  }
  .blob1 { width: 420px; height: 420px; background: #7c3aed; top: -100px; left: -100px; animation-delay: 0s; }
  .blob2 { width: 320px; height: 320px; background: #0ea5e9; top: 40%; right: -80px; animation-delay: 2s; }
  .blob3 { width: 260px; height: 260px; background: #f43f5e; bottom: -60px; left: 30%; animation-delay: 4s; }
  .blob4 { width: 200px; height: 200px; background: #10b981; top: 60%; left: -60px; animation-delay: 1s; }

  @keyframes blobFloat {
    from { transform: translate(0,0) scale(1); }
    to   { transform: translate(30px, 20px) scale(1.08); }
  }

  /* ── Floating mascots ── */
  .mascots {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
  }
  .mascot {
    position: absolute; font-size: 2.2rem;
    animation: floatMascot 6s ease-in-out infinite alternate;
    opacity: 0.55;
    user-select: none;
  }
  .mascot:nth-child(1) { top: 8%;  left: 5%;  animation-delay: 0s;   font-size: 2.5rem; }
  .mascot:nth-child(2) { top: 20%; right: 6%; animation-delay: 1.2s; font-size: 2rem; }
  .mascot:nth-child(3) { top: 50%; left: 3%;  animation-delay: 2s;   font-size: 1.8rem; }
  .mascot:nth-child(4) { bottom: 20%; right: 4%; animation-delay: 0.6s; font-size: 2.2rem; }
  .mascot:nth-child(5) { bottom: 8%; left: 12%; animation-delay: 1.8s; font-size: 1.6rem; }
  .mascot:nth-child(6) { top: 35%; right: 3%;  animation-delay: 3s;   font-size: 1.5rem; }

  @keyframes floatMascot {
    0%   { transform: translateY(0) rotate(-5deg); }
    100% { transform: translateY(-18px) rotate(5deg); }
  }

  /* ── App shell ── */
  #app {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }

  .card {
    background: rgba(15,12,41,0.75);
    backdrop-filter: blur(20px);
    border: 1px solid var(--card-border);
    border-radius: 28px;
    width: 100%; max-width: 500px;
    padding: 36px 32px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.5);
    animation: cardIn 0.5s cubic-bezier(.22,1,.36,1);
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(24px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ── Logo / Header ── */
  .logo {
    text-align: center; margin-bottom: 28px;
  }
  .logo-icon {
    font-size: 3.2rem; display: block; margin-bottom: 8px;
    animation: logoBounce 2s ease-in-out infinite;
  }
  @keyframes logoBounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  .logo-title {
    font-family: 'Nunito', sans-serif;
    font-size: 2rem; font-weight: 900;
    background: linear-gradient(135deg, var(--accent1), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }
  .logo-sub {
    font-size: 0.78rem; color: var(--muted);
    letter-spacing: 2px; text-transform: uppercase; margin-top: 4px;
  }

  /* ── Section title ── */
  .section-title {
    font-family: 'Nunito', sans-serif;
    font-size: 1.3rem; font-weight: 800;
    margin-bottom: 20px; text-align: center;
    color: var(--text);
  }
  .section-sub {
    font-size: 0.8rem; color: var(--muted);
    text-align: center; margin-bottom: 22px; line-height: 1.5;
  }

  /* ── Inputs ── */
  .field { margin-bottom: 14px; }
  .field label {
    display: block; font-size: 0.75rem; font-weight: 600;
    color: var(--accent1); text-transform: uppercase; letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .field input, .field select {
    width: 100%; padding: 13px 16px;
    background: rgba(255,255,255,0.05);
    border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: 14px; color: var(--text);
    font-family: 'Sora', sans-serif; font-size: 0.92rem;
    outline: none; transition: border-color 0.2s, background 0.2s;
    appearance: none;
  }
  .field input::placeholder { color: var(--muted); }
  .field input:focus, .field select:focus {
    border-color: var(--accent1);
    background: rgba(167,139,250,0.08);
  }
  .field select option { background: #1e1b4b; color: var(--text); }

  /* ── Buttons ── */
  .btn {
    width: 100%; padding: 14px;
    border: none; border-radius: 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem; font-weight: 800;
    cursor: pointer; transition: all 0.2s;
    letter-spacing: 0.3px;
  }
  .btn-primary {
    background: linear-gradient(135deg, #7c3aed, #4f46e5);
    color: #fff;
    box-shadow: 0 8px 24px rgba(124,58,237,0.35);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(124,58,237,0.5); }
  .btn-primary:active { transform: scale(0.98); }
  .btn-secondary {
    background: rgba(255,255,255,0.07);
    border: 1.5px solid rgba(255,255,255,0.12);
    color: var(--text);
    margin-top: 10px;
  }
  .btn-secondary:hover { background: rgba(255,255,255,0.12); }

  /* ── Subject cards ── */
  .subject-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 12px; margin-bottom: 20px;
  }
  .subject-card {
    background: rgba(255,255,255,0.05);
    border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: 18px; padding: 18px 14px;
    cursor: pointer; text-align: center;
    transition: all 0.22s;
  }
  .subject-card:hover {
    transform: translateY(-3px);
    border-color: var(--accent1);
    background: rgba(167,139,250,0.1);
    box-shadow: 0 8px 24px rgba(124,58,237,0.2);
  }
  .subject-card .s-icon { font-size: 2.2rem; display: block; margin-bottom: 8px; }
  .subject-card .s-name {
    font-family: 'Nunito', sans-serif;
    font-size: 0.85rem; font-weight: 800; color: var(--text);
    margin-bottom: 2px;
  }
  .subject-card .s-sub { font-size: 0.7rem; color: var(--muted); }
  .subject-card.loading { opacity: 0.5; cursor: wait; }

  /* ── Quiz screen ── */
  .quiz-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 20px;
  }
  .q-progress-wrap { flex: 1; }
  .q-progress-label {
    font-size: 0.72rem; color: var(--muted);
    margin-bottom: 5px; font-weight: 600;
  }
  .q-progress-track {
    height: 6px; background: rgba(255,255,255,0.08);
    border-radius: 3px; overflow: hidden;
  }
  .q-progress-fill {
    height: 100%; border-radius: 3px;
    background: linear-gradient(90deg, var(--accent1), var(--accent2));
    transition: width 0.4s ease;
  }

  /* ── Timer ── */
  .timer-circle {
    width: 58px; height: 58px; flex-shrink: 0;
    margin-left: 16px; position: relative;
  }
  .timer-circle svg { transform: rotate(-90deg); }
  .timer-circle .track { fill: none; stroke: rgba(255,255,255,0.08); stroke-width: 4; }
  .timer-circle .fill  { fill: none; stroke-width: 4; stroke-linecap: round;
    stroke: var(--accent2); transition: stroke-dashoffset 1s linear, stroke 0.5s; }
  .timer-num {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Nunito', sans-serif; font-size: 1.1rem; font-weight: 900;
    color: var(--text); transition: color 0.3s;
  }
  .timer-danger .fill { stroke: var(--accent3); }
  .timer-danger .timer-num { color: var(--accent3); }

  /* ── Question ── */
  .q-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(167,139,250,0.15); border: 1px solid rgba(167,139,250,0.3);
    border-radius: 20px; padding: 4px 12px;
    font-size: 0.7rem; font-weight: 700; color: var(--accent1);
    text-transform: uppercase; letter-spacing: 1px;
    margin-bottom: 14px;
  }
  .q-text-uz {
    font-family: 'Nunito', sans-serif;
    font-size: 1.05rem; font-weight: 800;
    color: var(--text); line-height: 1.5;
    margin-bottom: 6px;
  }
  .q-text-ru {
    font-size: 0.82rem; color: var(--muted);
    line-height: 1.5; margin-bottom: 20px;
  }
  .q-divider { border: none; border-top: 1px solid rgba(255,255,255,0.07); margin: 10px 0 16px; }

  /* ── Answer options ── */
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt-btn {
    display: flex; align-items: center; gap: 14px;
    background: rgba(255,255,255,0.04);
    border: 1.5px solid rgba(255,255,255,0.09);
    border-radius: 14px; padding: 13px 16px;
    cursor: pointer; text-align: left;
    transition: all 0.18s; position: relative; overflow: hidden;
  }
  .opt-btn:hover:not(.disabled) {
    background: rgba(167,139,250,0.1);
    border-color: rgba(167,139,250,0.4);
    transform: translateX(4px);
  }
  .opt-letter {
    width: 30px; height: 30px; flex-shrink: 0; border-radius: 50%;
    background: rgba(255,255,255,0.08); border: 1.5px solid rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Nunito', sans-serif; font-size: 0.82rem; font-weight: 900;
    color: var(--muted);
  }
  .opt-text { flex: 1; }
  .opt-text-uz { font-size: 0.88rem; font-weight: 600; color: var(--text); }
  .opt-text-ru { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
  .opt-icon { font-size: 1.1rem; opacity: 0; transition: opacity 0.2s; }

  .opt-btn.correct {
    background: rgba(52,211,153,0.12);
    border-color: var(--accent4);
    animation: popIn 0.35s ease;
  }
  .opt-btn.correct .opt-letter { background: var(--accent4); border-color: var(--accent4); color: #0f172a; }
  .opt-btn.correct .opt-icon { opacity: 1; }

  .opt-btn.wrong {
    background: rgba(251,113,133,0.12);
    border-color: var(--accent3);
    animation: shake 0.4s ease;
  }
  .opt-btn.wrong .opt-letter { background: var(--accent3); border-color: var(--accent3); color: #fff; }
  .opt-btn.wrong .opt-icon { opacity: 1; }

  .opt-btn.reveal { background: rgba(52,211,153,0.07); border-color: rgba(52,211,153,0.4); }
  .opt-btn.disabled { cursor: default; }

  @keyframes popIn { 0% { transform: scale(0.97); } 60% { transform: scale(1.02); } 100% { transform: scale(1); } }
  @keyframes shake  { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }

  /* ── Fact box ── */
  .fact-box {
    margin-top: 14px;
    background: rgba(251,191,36,0.07);
    border: 1px solid rgba(251,191,36,0.25);
    border-radius: 14px; padding: 14px 16px;
    display: none;
    animation: fadeUp 0.35s ease;
  }
  .fact-box.show { display: block; }
  .fact-label { font-size: 0.7rem; font-weight: 700; color: var(--gold); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 6px; }
  .fact-uz { font-size: 0.82rem; color: var(--text); line-height: 1.5; margin-bottom: 4px; }
  .fact-ru { font-size: 0.75rem; color: var(--muted); line-height: 1.5; }

  .next-wrap { margin-top: 16px; display: none; }
  .next-wrap.show { display: block; }

  @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

  /* ── Score bar ── */
  .score-bar {
    display: flex; align-items: center; justify-content: center; gap: 20px;
    margin-bottom: 18px; flex-wrap: wrap;
  }
  .score-pill {
    display: flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px; padding: 6px 14px;
    font-size: 0.8rem; font-weight: 700; color: var(--text);
  }
  .score-pill span { font-size: 1rem; }

  /* ── Results screen ── */
  .result-hero {
    text-align: center; margin-bottom: 24px;
  }
  .result-emoji { font-size: 4rem; display: block; margin-bottom: 10px; animation: logoBounce 2s ease-in-out infinite; }
  .result-pct {
    font-family: 'Nunito', sans-serif; font-size: 3.5rem; font-weight: 900;
    line-height: 1;
  }
  .result-pct.grade-a { background: linear-gradient(135deg,#34d399,#059669); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .result-pct.grade-b { background: linear-gradient(135deg,#38bdf8,#0284c7); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .result-pct.grade-c { background: linear-gradient(135deg,#fbbf24,#d97706); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .result-pct.grade-d { background: linear-gradient(135deg,#fb7185,#e11d48); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .result-label { font-size: 0.85rem; color: var(--muted); margin-top: 4px; }

  .result-stats {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 10px; margin-bottom: 20px;
  }
  .stat-box {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px; padding: 14px 10px; text-align: center;
  }
  .stat-val { font-family: 'Nunito', sans-serif; font-size: 1.5rem; font-weight: 900; }
  .stat-val.green { color: var(--accent4); }
  .stat-val.red   { color: var(--accent3); }
  .stat-val.blue  { color: var(--accent2); }
  .stat-lbl { font-size: 0.68rem; color: var(--muted); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.8px; }

  .analysis-section { margin-bottom: 18px; }
  .analysis-title {
    font-family: 'Nunito', sans-serif; font-size: 0.9rem; font-weight: 800;
    margin-bottom: 12px; display: flex; align-items: center; gap: 6px;
  }
  .topic-row {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 8px;
  }
  .topic-name { font-size: 0.78rem; flex: 1; color: var(--text); }
  .topic-bar-wrap { width: 80px; height: 6px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; }
  .topic-bar-fill { height: 100%; border-radius: 3px; }
  .topic-status { font-size: 0.7rem; width: 28px; text-align: right; }

  .recs-box {
    background: rgba(167,139,250,0.08); border: 1px solid rgba(167,139,250,0.2);
    border-radius: 16px; padding: 16px;
    margin-bottom: 18px;
  }
  .rec-item {
    display: flex; align-items: flex-start; gap: 10px;
    margin-bottom: 10px; font-size: 0.8rem; line-height: 1.5;
  }
  .rec-item:last-child { margin-bottom: 0; }
  .rec-item .ri { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }
  .rec-text { color: var(--text); }
  .rec-sub { color: var(--muted); font-size: 0.72rem; }

  /* ── Loading spinner ── */
  .loader {
    text-align: center; padding: 40px 0;
  }
  .spinner {
    width: 48px; height: 48px; border-radius: 50%;
    border: 4px solid rgba(255,255,255,0.08);
    border-top-color: var(--accent1);
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loader-text { font-size: 0.85rem; color: var(--muted); }

  /* ── Error box ── */
  .error-box {
    background: rgba(251,113,133,0.1); border: 1px solid rgba(251,113,133,0.3);
    border-radius: 14px; padding: 16px; text-align: center;
    font-size: 0.85rem; color: var(--accent3); margin-bottom: 16px;
  }

  /* ── Timeout notice ── */
  .timeout-notice {
    text-align: center; padding: 16px 0;
    font-size: 0.9rem; color: var(--accent3); font-weight: 700;
    animation: fadeUp 0.3s ease;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }

  /* ── Responsive ── */
  @media (max-width: 480px) {
    .card { padding: 26px 20px; border-radius: 22px; }
    .subject-grid { grid-template-columns: 1fr; }
    .result-stats { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<!-- Animated background -->
<div class="bg-blobs">
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>
  <div class="blob blob4"></div>
</div>

<!-- Floating mascots -->
<div class="mascots">
  <div class="mascot">🦊</div>
  <div class="mascot">🐧</div>
  <div class="mascot">🦉</div>
  <div class="mascot">🐸</div>
  <div class="mascot">🐨</div>
  <div class="mascot">⭐</div>
</div>

<div id="app">
  <div class="card" id="card"></div>
</div>

<script>
// ═══════════════════════════════════════════════════
// НАСТРОЙКИ — замени на свой URL Google Apps Script
// ═══════════════════════════════════════════════════
const API_URL = "https://script.google.com/macros/s/AKfycbwXOdtu5vBrQ7gEqX8q0NdfIR6jmlyTE12S_gGjYkBYT3an2kTE5Gt0M2T_36JK4A_E/exec";

// Иконки предметов
const SUBJECT_ICONS = {
  "Matematika": "🔢", "Математика": "🔢",
  "Ingliz tili": "🇬🇧", "Английский язык": "🇬🇧", "English": "🇬🇧",
  "Mantiq": "🧩", "Логика": "🧩",
  "Fizika": "⚡", "Физика": "⚡",
  "Kimyo": "🧪", "Химия": "🧪",
  "Biologiya": "🌿", "Биология": "🌿",
  "Tarix": "📜", "История": "📜",
  "Ona tili": "📖", "Русский язык": "📖",
  "Informatika": "💻", "Информатика": "💻",
  "Geografiya": "🌍", "География": "🌍",
};

const TIMER_TOTAL = 30;
const LETTERS = ['A','B','C','D'];

let state = {
  view: 'auth',       // auth | subjects | quiz | results
  user: {},
  subjects: [],
  subject: '',
  questions: [],
  idx: 0,
  score: 0,
  timeLeft: TIMER_TOTAL,
  timerInterval: null,
  answered: false,
  history: [],        // { q, userIdx, correctIdx, topic_uz, topic_ru, correct }
};

// ─── Utility ─────────────────────────────────────
function el(id) { return document.getElementById(id); }
function card() { return el('card'); }

function setCard(html) {
  const c = card();
  c.style.opacity = '0';
  c.style.transform = 'translateY(12px) scale(0.98)';
  setTimeout(() => {
    c.innerHTML = html;
    c.style.transition = 'opacity 0.35s ease, transform 0.35s ease';
    c.style.opacity = '1';
    c.style.transform = 'translateY(0) scale(1)';
  }, 150);
}

// ─── Screen: AUTH ────────────────────────────────
function showAuth() {
  state.view = 'auth';
  setCard(`
    <div class="logo">
      <span class="logo-icon">🎓</span>
      <div class="logo-title">EduQuiz</div>
      <div class="logo-sub">Bilim Platformasi · Платформа знаний</div>
    </div>
    <div class="section-title">Kirish / Вход</div>
    <div class="section-sub">Ma'lumotlaringizni kiriting<br>Введите ваши данные</div>

    <div class="field">
      <label>👤 F.I.O / ФИО</label>
      <input id="inp-name" type="text" placeholder="Familiya Ism Otasining ismi" maxlength="80">
    </div>
    <div class="field">
      <label>🏫 Sinf / Класс</label>
      <input id="inp-class" type="text" placeholder="Masalan: 9-A / Например: 9-А" maxlength="20">
    </div>
    <div class="field">
      <label>👩‍🏫 O'qituvchi / Учитель</label>
      <input id="inp-teacher" type="text" placeholder="O'qituvchining F.I.O / ФИО учителя" maxlength="80">
    </div>

    <div id="auth-err"></div>
    <button class="btn btn-primary" onclick="submitAuth()">Davom etish / Продолжить →</button>
  `);
}

function submitAuth() {
  const name    = el('inp-name').value.trim();
  const cls     = el('inp-class').value.trim();
  const teacher = el('inp-teacher').value.trim();
  const errEl   = el('auth-err');

  if (!name || !cls || !teacher) {
    errEl.innerHTML = `<div class="error-box">⚠️ Barcha maydonlarni to'ldiring / Заполните все поля</div>`;
    return;
  }
  state.user = { name, class: cls, teacher };
  loadSubjects();
}

// ─── Screen: SUBJECTS ────────────────────────────
async function loadSubjects() {
  setCard(`<div class="loader"><div class="spinner"></div><div class="loader-text">Fanlar yuklanmoqda…<br>Загрузка предметов…</div></div>`);
  try {
    const res  = await fetch(API_URL);
    const json = await res.json();
    state.subjects = json.data || [];
    showSubjects();
  } catch(e) {
    // Demo mode — show sample subjects
    state.subjects = ["Matematika","Ingliz tili","Mantiq","Fizika","Kimyo","Biologiya"];
    showSubjects(true);
  }
}

function showSubjects(demo = false) {
  state.view = 'subjects';
  const grid = state.subjects.map(s => {
    const icon = SUBJECT_ICONS[s] || '📚';
    return `<div class="subject-card" onclick="loadQuestions('${s}')">
      <span class="s-icon">${icon}</span>
      <div class="s-name">${s}</div>
      <div class="s-sub">Test boshlash</div>
    </div>`;
  }).join('');

  const demoNote = demo ? `<div class="error-box" style="margin-bottom:16px;font-size:0.75rem;">
    ⚙️ Demo rejim — API URL ni sozlang<br>Demo mode — настройте API URL
  </div>` : '';

  setCard(`
    <div class="logo" style="margin-bottom:20px;">
      <span class="logo-icon" style="font-size:2rem;">📚</span>
      <div class="logo-title" style="font-size:1.5rem;">Fan tanlang</div>
      <div class="logo-sub">Выберите предмет</div>
    </div>
    <div class="score-bar">
      <div class="score-pill"><span>👤</span>${state.user.name.split(' ')[0]}</div>
      <div class="score-pill"><span>🏫</span>${state.user.class}</div>
    </div>
    ${demoNote}
    <div class="subject-grid">${grid}</div>
    <button class="btn btn-secondary" onclick="showAuth()">← Orqaga / Назад</button>
  `);
}

// ─── Load Questions ───────────────────────────────
async function loadQuestions(subject) {
  state.subject = subject;
  // Mark loading
  document.querySelectorAll('.subject-card').forEach(c => {
    c.classList.add('loading');
    c.onclick = null;
  });
  try {
    const res  = await fetch(`${API_URL}?subject=${encodeURIComponent(subject)}`);
    const json = await res.json();
    let qs = json.data || [];
    // Limit & shuffle
    const limit = parseInt(json.limit) || qs.length;
    qs = shuffle(qs).slice(0, limit);
    state.questions = qs;
    startQuiz();
  } catch(e) {
    // Demo questions
    state.questions = getDemoQuestions(subject);
    startQuiz();
  }
}

// ─── Quiz ────────────────────────────────────────
function startQuiz() {
  state.idx = 0; state.score = 0;
  state.history = []; state.answered = false;
  renderQuestion();
}

function renderQuestion() {
  if (state.timerInterval) clearInterval(state.timerInterval);
  state.answered = false;
  state.timeLeft = TIMER_TOTAL;
  const q   = state.questions[state.idx];
  const num = state.idx + 1;
  const tot = state.questions.length;
  const pct = Math.round((state.idx / tot) * 100);
  const icon = SUBJECT_ICONS[state.subject] || '📚';
  const circumference = 2 * Math.PI * 22;

  const opts = q.options.map((opt, i) => `
    <div class="opt-btn" id="opt-${i}" onclick="selectAnswer(${i})">
      <div class="opt-letter">${LETTERS[i]}</div>
      <div class="opt-text">
        <div class="opt-text-uz">${opt.uz || opt.text || opt}</div>
        ${opt.ru ? `<div class="opt-text-ru">${opt.ru}</div>` : ''}
      </div>
      <div class="opt-icon">${i === q.correct ? '✅' : '❌'}</div>
    </div>
  `).join('');

  setCard(`
    <div class="quiz-header">
      <div class="q-progress-wrap">
        <div class="q-progress-label">${icon} ${state.subject} · ${num} / ${tot}</div>
        <div class="q-progress-track">
          <div class="q-progress-fill" id="qfill" style="width:${pct}%"></div>
        </div>
      </div>
      <div class="timer-circle" id="timerCircle">
        <svg width="58" height="58" viewBox="0 0 58 58">
          <circle class="track" cx="29" cy="29" r="22"/>
          <circle class="fill" id="timerArc" cx="29" cy="29" r="22"
            stroke-dasharray="${circumference}"
            stroke-dashoffset="0"/>
        </svg>
        <div class="timer-num" id="timerNum">${TIMER_TOTAL}</div>
      </div>
    </div>

    <div class="score-bar">
      <div class="score-pill"><span>✅</span><span id="sc-correct">${state.score}</span></div>
      <div class="score-pill"><span>❌</span><span id="sc-wrong">${state.history.filter(h=>!h.correct).length}</span></div>
      <div class="score-pill"><span>⏱</span><span id="sc-time">${TIMER_TOTAL}s</span></div>
    </div>

    <div class="q-badge">📝 Savol / Вопрос ${num}</div>
    <div class="q-text-uz">${q.question_uz || q.question}</div>
    ${q.question_ru ? `<hr class="q-divider"><div class="q-text-ru">${q.question_ru}</div>` : ''}

    <div class="options" id="opts">${opts}</div>

    <div class="fact-box" id="factBox">
      <div class="fact-label">💡 Qiziqarli / Интересно</div>
      <div class="fact-uz" id="factUz"></div>
      <div class="fact-ru" id="factRu"></div>
    </div>
    <div class="next-wrap" id="nextWrap">
      <button class="btn btn-primary" onclick="nextQ()">
        ${state.idx + 1 < state.questions.length ? 'Keyingi / Следующий →' : '🏁 Natija / Результат'}
      </button>
    </div>
  `);

  startTimer();
}

function startTimer() {
  const circumference = 2 * Math.PI * 22;
  state.timerInterval = setInterval(() => {
    if (!el('timerNum')) { clearInterval(state.timerInterval); return; }
    state.timeLeft--;
    el('timerNum').textContent = state.timeLeft;
    el('sc-time').textContent  = state.timeLeft + 's';

    const offset = circumference * (1 - state.timeLeft / TIMER_TOTAL);
    el('timerArc').style.strokeDashoffset = offset;

    if (state.timeLeft <= 10) {
      el('timerCircle').classList.add('timer-danger');
    }
    if (state.timeLeft <= 0) {
      clearInterval(state.timerInterval);
      if (!state.answered) timeOut();
    }
  }, 1000);
}

function timeOut() {
  state.answered = true;
  const q = state.questions[state.idx];
  state.history.push({ q: q.question_uz || q.question, userIdx: -1, correctIdx: q.correct, topic_uz: q.topic_uz || q.topic || '—', topic_ru: q.topic_ru || q.topic || '—', correct: false, timedOut: true });

  // Show correct answer
  document.querySelectorAll('.opt-btn').forEach(b => b.classList.add('disabled'));
  el(`opt-${q.correct}`).classList.add('reveal');
  el('opts').insertAdjacentHTML('afterend', `<div class="timeout-notice">⏰ Vaqt tugadi! / Время вышло!</div>`);
  if (q.fact_uz || q.fact_ru) {
    el('factUz').textContent = q.fact_uz || '';
    el('factRu').textContent = q.fact_ru || '';
    el('factBox').classList.add('show');
  }
  el('nextWrap').classList.add('show');
}

function selectAnswer(idx) {
  if (state.answered) return;
  state.answered = true;
  clearInterval(state.timerInterval);

  const q = state.questions[state.idx];
  const correct = idx === q.correct;

  document.querySelectorAll('.opt-btn').forEach(b => b.classList.add('disabled'));
  if (correct) {
    el(`opt-${idx}`).classList.add('correct');
    state.score++;
    el('sc-correct').textContent = state.score;
  } else {
    el(`opt-${idx}`).classList.add('wrong');
    el(`opt-${q.correct}`).classList.add('reveal');
    el('sc-wrong').textContent = state.history.filter(h=>!h.correct).length + 1;
  }

  state.history.push({ q: q.question_uz || q.question, userIdx: idx, correctIdx: q.correct, topic_uz: q.topic_uz || q.topic || '—', topic_ru: q.topic_ru || q.topic || '—', correct });

  if (q.fact_uz || q.fact_ru) {
    el('factUz').textContent = q.fact_uz || '';
    el('factRu').textContent = q.fact_ru || '';
    el('factBox').classList.add('show');
  }
  el('nextWrap').classList.add('show');
}

function nextQ() {
  state.idx++;
  if (state.idx < state.questions.length) renderQuestion();
  else showResults();
}

// ─── Results ─────────────────────────────────────
async function showResults() {
  state.view = 'results';
  const total   = state.questions.length;
  const correct = state.score;
  const wrong   = total - correct;
  const pct     = Math.round((correct / total) * 100);

  // Grade
  let grade, emoji, gradeClass, gradeUz, gradeRu;
  if (pct >= 86) { grade='5'; emoji='🏆'; gradeClass='grade-a'; gradeUz="A'lo! Mukammal natija!"; gradeRu="Отлично! Превосходный результат!"; }
  else if (pct >= 71) { grade='4'; emoji='🌟'; gradeClass='grade-b'; gradeUz="Yaxshi! Zo'r ishlading!"; gradeRu="Хорошо! Отличная работа!"; }
  else if (pct >= 56) { grade='3'; emoji='😊'; gradeClass='grade-c'; gradeUz="Qoniqarli. Ko'proq mashq qiling!"; gradeRu="Удовлетворительно. Больше практики!"; }
  else { grade='2'; emoji='💪'; gradeClass='grade-d'; gradeUz="Qoniqarsiz. Qayta o'rganish kerak!"; gradeRu="Неудовлетворительно. Нужно повторить!"; }

  // Topic analysis
  const topicMap = {};
  state.history.forEach(h => {
    const key = h.topic_uz || '—';
    if (!topicMap[key]) topicMap[key] = { uz: h.topic_uz, ru: h.topic_ru, total: 0, wrong: 0 };
    topicMap[key].total++;
    if (!h.correct) topicMap[key].wrong++;
  });

  const topics = Object.values(topicMap).sort((a,b) => b.wrong - a.wrong);

  const topicRows = topics.map(t => {
    const errPct = Math.round((t.wrong / t.total) * 100);
    const color  = errPct >= 60 ? '#fb7185' : errPct >= 30 ? '#fbbf24' : '#34d399';
    const status = errPct >= 60 ? '🔴' : errPct >= 30 ? '🟡' : '🟢';
    return `<div class="topic-row">
      <div class="topic-name">${t.uz || '—'}<br><span style="font-size:0.68rem;color:var(--muted)">${t.ru || ''}</span></div>
      <div class="topic-bar-wrap"><div class="topic-bar-fill" style="width:${errPct}%;background:${color}"></div></div>
      <div class="topic-status">${status}</div>
    </div>`;
  }).join('');

  // Recommendations
  const weakTopics = topics.filter(t => t.wrong > 0);
  let recs = [];
  if (weakTopics.length === 0) {
    recs.push({ icon: '🎉', uz: "Barcha mavzularni yaxshi bilasiz!", ru: "Вы отлично знаете все темы!" });
  } else {
    weakTopics.slice(0,3).forEach(t => {
      recs.push({ icon: '📌', uz: `"${t.uz}" mavzusini qayta o'rganing`, ru: `Повторите тему "${t.ru}"` });
    });
    if (pct < 60) recs.push({ icon: '🔁', uz: "Ushbu fanni boshidan o'rganing", ru: "Пройдите предмет заново с основ" });
    if (pct >= 60 && pct < 86) recs.push({ icon: '💡', uz: "Mashqlarni ko'proq bajarib ko'ring", ru: "Решайте больше практических задач" });
  }

  const recHtml = recs.map(r => `
    <div class="rec-item">
      <div class="ri">${r.icon}</div>
      <div class="rec-text">${r.uz}<br><div class="rec-sub">${r.ru}</div></div>
    </div>`).join('');

  // Question review
  const reviewHtml = state.history.map((h,i) => {
    const icon = h.correct ? '✅' : (h.timedOut ? '⏰' : '❌');
    return `<div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;font-size:0.75rem;">
      <span>${icon}</span>
      <span style="color:var(--muted);line-height:1.4">${i+1}. ${h.q}</span>
    </div>`;
  }).join('');

  const now = new Date();
  const dateStr = now.toLocaleString('ru-RU');

  setCard(`
    <div class="result-hero">
      <span class="result-emoji">${emoji}</span>
      <div class="result-pct ${gradeClass}">${pct}%</div>
      <div style="font-family:'Nunito',sans-serif;font-weight:900;font-size:1.4rem;margin-top:6px;color:var(--text)">Baho: ${grade} / Оценка: ${grade}</div>
      <div class="result-label">${gradeUz}<br>${gradeRu}</div>
    </div>

    <div class="result-stats">
      <div class="stat-box">
        <div class="stat-val green">${correct}</div>
        <div class="stat-lbl">To'g'ri / Верно</div>
      </div>
      <div class="stat-box">
        <div class="stat-val red">${wrong}</div>
        <div class="stat-lbl">Xato / Ошибки</div>
      </div>
      <div class="stat-box">
        <div class="stat-val blue">${total}</div>
        <div class="stat-lbl">Jami / Всего</div>
      </div>
    </div>

    <div class="analysis-section">
      <div class="analysis-title">📊 Mavzular tahlili / Анализ по темам</div>
      ${topicRows || '<div style="font-size:0.8rem;color:var(--muted);text-align:center">Mavzu ma\'lumoti yo\'q / Нет данных по темам</div>'}
    </div>

    <div class="analysis-section">
      <div class="analysis-title">💡 Tavsiyalar / Рекомендации</div>
      <div class="recs-box">${recHtml}</div>
    </div>

    <div class="analysis-section">
      <div class="analysis-title">📋 Savollar ko'rinishi / Обзор вопросов</div>
      <div style="max-height:140px;overflow-y:auto;padding:4px 0">${reviewHtml}</div>
    </div>

    <div style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:14px;margin-bottom:18px;font-size:0.75rem;color:var(--muted)">
      👤 ${state.user.name} · ${state.user.class} · 👩‍🏫 ${state.user.teacher}<br>
      📅 ${dateStr} · 📚 ${state.subject}
    </div>

    <button class="btn btn-primary" onclick="restart()">🔄 Qayta boshlash / Начать заново</button>
    <button class="btn btn-secondary" onclick="showSubjects()">📚 Fan tanlash / Выбрать предмет</button>
  `);

  // Send to Google Sheets
  try {
    const errors = weakTopics.map(t => t.uz).join(', ') || 'Ошибок нет';
    const rec    = recs.map(r => r.ru).join('; ');
    await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({
        name: state.user.name, class: state.user.class, teacher: state.user.teacher,
        subject: state.subject, score: correct, total, accuracy: pct,
        grade, errors, rec, date: dateStr
      })
    });
  } catch(e) { console.log('Offline / demo — results not saved'); }
}

function restart() {
  state = { view:'auth', user:{}, subjects:[], subject:'', questions:[], idx:0, score:0, timeLeft:TIMER_TOTAL, timerInterval:null, answered:false, history:[] };
  showAuth();
}

// ─── Helpers ─────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function getDemoQuestions(subject) {
  const demos = {
    "Matematika": [
      { question_uz:"2² + 3² = ?", question_ru:"2² + 3² = ?", options:[{uz:"10"},{uz:"12"},{uz:"13"},{uz:"15"}], correct:2, topic_uz:"Darajalar", topic_ru:"Степени", fact_uz:"4+9=13", fact_ru:"4+9=13" },
      { question_uz:"√144 = ?", question_ru:"√144 = ?", options:[{uz:"10"},{uz:"11"},{uz:"12"},{uz:"14"}], correct:2, topic_uz:"Ildizlar", topic_ru:"Корни" },
      { question_uz:"15% from 200 = ?", question_ru:"15% от 200 = ?", options:[{uz:"25"},{uz:"30"},{uz:"35"},{uz:"20"}], correct:1, topic_uz:"Foizlar", topic_ru:"Проценты" },
      { question_uz:"3x = 21, x = ?", question_ru:"3x = 21, x = ?", options:[{uz:"5"},{uz:"6"},{uz:"7"},{uz:"8"}], correct:2, topic_uz:"Tenglamalar", topic_ru:"Уравнения" },
      { question_uz:"Uchburchak burchaklari yig'indisi?", question_ru:"Сумма углов треугольника?", options:[{uz:"90°"},{uz:"180°"},{uz:"270°"},{uz:"360°"}], correct:1, topic_uz:"Geometriya", topic_ru:"Геометрия" },
    ],
    "Ingliz tili": [
      { question_uz:"'Apple' so'zining tarjimasi?", question_ru:"Перевод слова 'Apple'?", options:[{uz:"Nok"},{uz:"Olma"},{uz:"Uzum"},{uz:"Shaftoli"}], correct:1, topic_uz:"Lug'at", topic_ru:"Лексика" },
      { question_uz:"She ___ a student. (to be)", question_ru:"She ___ a student. (to be)", options:[{uz:"am"},{uz:"are"},{uz:"is"},{uz:"be"}], correct:2, topic_uz:"Grammatika", topic_ru:"Грамматика" },
      { question_uz:"'Beautiful' antonimi?", question_ru:"Антоним 'Beautiful'?", options:[{uz:"Pretty"},{uz:"Ugly"},{uz:"Nice"},{uz:"Lovely"}], correct:1, topic_uz:"Antonimlar", topic_ru:"Антонимы" },
    ],
    "Mantiq": [
      { question_uz:"Keyingi: 2, 4, 8, 16, ___", question_ru:"Следующее: 2, 4, 8, 16, ___", options:[{uz:"24"},{uz:"30"},{uz:"32"},{uz:"36"}], correct:2, topic_uz:"Ketma-ketlik", topic_ru:"Последовательности" },
      { question_uz:"5 ta olmadan 2 tasini olsak nechta qoladi?", question_ru:"Из 5 яблок взяли 2, сколько осталось?", options:[{uz:"1"},{uz:"2"},{uz:"3"},{uz:"4"}], correct:2, topic_uz:"Masalalar", topic_ru:"Задачи" },
    ],
  };
  return demos[subject] || demos["Mantiq"];
}

// ─── Start ────────────────────────────────────────
showAuth();
</script>
</body>
</html>
