<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduQuiz — Bilim platformasi</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: 'Nunito', sans-serif; background: #f0f2f5; }
        .correct { background-color: #10B981 !important; color: white; animation: pulse 0.5s; }
        .wrong { background-color: #EF4444 !important; color: white; animation: shake 0.5s; }
        @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.05);} 100% {transform: scale(1);} }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-xl p-6">
        <div class="flex justify-between items-center border-b pb-4 mb-6">
            <h1 class="text-2xl font-bold text-indigo-600" onclick="location.reload()"><i class="fas fa-graduation-cap"></i> EduQuiz</h1>
            <span id="role-badge" class="hidden px-3 py-1 bg-indigo-100 text-indigo-800 rounded-full text-sm font-semibold"></span>
        </div>

        <div id="screen-auth" class="space-y-6 text-center py-10">
            <h2 class="text-3xl font-extrabold text-gray-800">Welcome to EduQuiz</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 pt-4">
                <button onclick="showRoleModal('teacher')" class="p-6 border-2 border-indigo-500 rounded-xl hover:bg-indigo-50 transition cursor-pointer group">
                    <i class="fas fa-chalkboard-teacher text-5xl text-indigo-500 mb-4 group-hover:scale-110 transition"></i>
                    <h3 class="text-xl font-bold text-gray-700">O'qituvchi (Учитель)</h3>
                </button>
                <button onclick="showRoleModal('student')" class="p-6 border-2 border-emerald-500 rounded-xl hover:bg-emerald-50 transition cursor-pointer group">
                    <i class="fas fa-user-graduate text-5xl text-emerald-500 mb-4 group-hover:scale-110 transition"></i>
                    <h3 class="text-xl font-bold text-gray-700">O'quvchi (Ученик)</h3>
                </button>
            </div>
        </div>

        <div id="auth-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4">
            <div class="bg-white rounded-xl p-6 w-full max-w-md shadow-2xl relative">
                <h3 id="modal-title" class="text-xl font-bold mb-4">Kirish</h3>
                <div id="modal-inputs" class="space-y-4"></div>
                <div class="flex justify-end gap-2 mt-6">
                    <button onclick="closeModal()" class="px-4 py-2 text-gray-500 hover:bg-gray-100 rounded-lg cursor-pointer">Yopish</button>
                    <button onclick="submitAuth()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 cursor-pointer">Kirish</button>
                </div>
            </div>
        </div>

        <div id="screen-teacher" class="hidden space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 bg-gray-50 p-4 rounded-xl">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Fan (Предмет)</label>
                    <select id="quiz-subject" class="mt-1 block w-full p-2 border border-gray-300 rounded-md bg-white">
                        <option value="Matematika">Matematika</option>
                        <option value="Fizika">Fizika</option>
                        <option value="Kimyo">Kimyo</option>
                        <option value="Biologiya">Biologiya</option>
                        <option value="Ona tili">Ona tili</option>
                        <option value="Elektrik">Elektrik</option>
                        <option value="Avto-mexanik">Avto-mexanik</option>
                        <option value="Buxgalteriya">Buxgalteriya</option>
                        <option value="Dasturlash">Dasturlash</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Mavzu (Тема)</label>
                    <input type="text" id="quiz-topic" class="mt-1 block w-full p-2 border border-gray-300 rounded-md">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Savollar soni</label>
                    <select id="quiz-count" class="mt-1 block w-full p-2 border border-gray-300 rounded-md bg-white">
                        <option value="5">5</option>
                        <option value="10" selected>10</option>
                        <option value="15">15</option>
                    </select>
                </div>
            </div>

            <div class="flex flex-wrap gap-3">
                <button onclick="generateQuiz(false)" id="btn-gen-new" class="flex-1 bg-indigo-600 text-white py-3 px-4 rounded-xl font-bold hover:bg-indigo-700 transition cursor-pointer flex justify-center items-center gap-2">
                    <i class="fas fa-robot"></i> Yangi test yaratish (Авто-генерация)
                </button>
                <button onclick="generateQuiz(true)" id="btn-gen-exist" class="bg-amber-500 text-white py-3 px-6 rounded-xl font-bold hover:bg-amber-600 transition cursor-pointer flex justify-center items-center gap-2">
                    <i class="fas fa-database"></i> Mavjud testdan foydalanish
                </button>
            </div>

            <div id="teacher-status" class="hidden p-4 rounded-xl text-center font-medium"></div>

            <div id="share-panel" class="hidden bg-emerald-50 p-6 rounded-xl border border-emerald-200 text-center space-y-4">
                <h3 class="text-xl font-bold text-emerald-800">Yaratildi va Google Sheets'ga saqlandi!</h3>
                <div class="flex justify-center"><div id="qrcode" class="p-2 bg-white rounded-lg shadow-md"></div></div>
                <p class="text-xs text-gray-400"><a id="share-link" href="#" target="_blank" class="text-indigo-600 underline"></a></p>
            </div>
        </div>

        <div id="screen-quiz" class="hidden space-y-6">
            <div class="flex justify-between items-center bg-gray-50 p-3 rounded-lg text-sm text-gray-600">
                <span>O'quvchi: <b id="student-name-display"></b></span>
                <span>Fan: <b id="student-subject-display"></b></span>
                <span class="font-bold text-indigo-600" id="quiz-progress">0/0</span>
            </div>
            <div class="space-y-4">
                <div class="bg-indigo-50 p-5 rounded-xl border-l-4 border-indigo-500">
                    <h3 id="question-text" class="text-lg font-bold text-gray-800 leading-relaxed"></h3>
                </div>
                <div class="grid grid-cols-1 gap-3" id="answers-container"></div>
            </div>
            <div class="flex justify-end">
                <button id="btn-next" onclick="nextQuestion()" class="hidden bg-gray-800 text-white px-6 py-2 rounded-lg font-semibold hover:bg-gray-900 cursor-pointer">Keyingisi</button>
            </div>
        </div>

        <div id="screen-results" class="hidden text-center space-y-6 py-8">
            <div class="w-24 h-24 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto text-4xl shadow-inner"><i class="fas fa-check-double"></i></div>
            <h2 class="text-3xl font-extrabold text-gray-800">Natija</h2>
            <p class="text-xl text-gray-600"><span id="res-score" class="font-bold text-indigo-600">0</span> / <span id="res-total">0</span> (<span id="res-percent">0</span>%)</p>
            <button onclick="location.reload()" class="mt-4 px-6 py-2 bg-gray-200 text-gray-700 font-semibold rounded-lg hover:bg-gray-300 cursor-pointer">Boshiga qaytish</button>
        </div>
    </div>

    <script>
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby2XjM5-xn0gy7M-JdhyUgiKGZ2R7xpNOJ0CaYIFrsaHeuKXw_xH7USdd07HoT4rVXG/exec";
        const TEACHER_PIN = "1234";

        let currentQuestions = [], currentQuestionIdx = 0, score = 0, selectedAuthRole = '';
        let sessionData = { name: '', group: '', teacher: 'AI', subject: '' };

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            if (params.get('subject')) showRoleModal('student', params.get('subject'));
        };

        function showRoleModal(role, autoSubject = '') {
            selectedAuthRole = role;
            const container = document.getElementById('modal-inputs');
            container.innerHTML = '';
            
            if (role === 'teacher') {
                container.innerHTML = `<div><label class="block text-sm font-medium text-gray-700">PIN kod</label><input type="password" id="auth-pin" class="mt-1 block w-full p-2 border border-gray-300 rounded-md text-center text-lg font-bold"></div>`;
            } else {
                container.innerHTML = `
                    <div><label class="block text-sm font-medium text-gray-700">Ism va Familiya</label><input type="text" id="auth-name" class="mt-1 block w-full p-2 border border-gray-300 rounded-md"></div>
                    <div><label class="block text-sm font-medium text-gray-700">Sinf / Guruh</label><input type="text" id="auth-group" class="mt-1 block w-full p-2 border border-gray-300 rounded-md"></div>
                    <div><label class="block text-sm font-medium text-gray-700">Fan</label><select id="auth-subject" class="mt-1 block w-full p-2 border border-gray-300 rounded-md bg-white" ${autoSubject?'disabled':''}>
                        <option value="Matematika" ${autoSubject=='Matematika'?'selected':''}>Matematika</option>
                        <option value="Fizika" ${autoSubject=='Fizika'?'selected':''}>Fizika</option>
                        <option value="Kimyo" ${autoSubject=='Kimyo'?'selected':''}>Kimyo</option>
                        <option value="Biologiya" ${autoSubject=='Biologiya'?'selected':''}>Biologiya</option>
                        <option value="Ona tili" ${autoSubject=='Ona tili'?'selected':''}>Ona tili</option>
                        <option value="Elektrik" ${autoSubject=='Elektrik'?'selected':''}>Elektrik</option>
                        <option value="Avto-mexanik" ${autoSubject=='Avto-mexanik'?'selected':''}>Avto-mexanik</option>
                        <option value="Buxgalteriya" ${autoSubject=='Buxgalteriya'?'selected':''}>Buxgalteriya</option>
                        <option value="Dasturlash" ${autoSubject=='Dasturlash'?'selected':''}>Dasturlash</option>
                    </select></div>`;
            }
            document.getElementById('auth-modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('auth-modal').classList.add('hidden'); }

        function submitAuth() {
            if (selectedAuthRole === 'teacher') {
                if (document.getElementById('auth-pin').value === TEACHER_PIN) {
                    closeModal(); switchScreen('screen-teacher', 'O\'qituvchi');
                } else alert('Xato PIN!');
            } else {
                const name = document.getElementById('auth-name').value.trim();
                const group = document.getElementById('auth-group').value.trim();
                const subj = document.getElementById('auth-subject').value;
                if (!name || !group) return alert('Ma\'lumotlarni to\'ldiring!');
                sessionData = { name, group, teacher: 'AI System', subject: subj };
                closeModal(); loadQuizForStudent(subj);
            }
        }

        function switchScreen(screenId, badgeText) {
            ['screen-auth', 'screen-teacher', 'screen-quiz', 'screen-results'].forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById(screenId).classList.remove('hidden');
            const badge = document.getElementById('role-badge');
            badge.innerText = badgeText; badge.classList.remove('hidden');
        }

        async function generateQuiz(useExisting) {
            const subject = document.getElementById('quiz-subject').value;
            const topic = document.getElementById('quiz-topic').value.trim() || "Umumiy";
            const count = parseInt(document.getElementById('quiz-count').value);
            const statusDiv = document.getElementById('teacher-status');
            
            statusDiv.className = "p-4 rounded-xl text-center font-medium bg-amber-100 text-amber-800";
            statusDiv.innerHTML = `<i class="fas fa-spinner fa-spin mr-2"></i> Kuting...`;
            statusDiv.classList.remove('hidden');

            if (useExisting) {
                try {
                    const response = await fetch(`${APPS_SCRIPT_URL}?type=get_questions&subject=${encodeURIComponent(subject)}`);
                    const resData = await response.json();
                    if (resData.questions?.length > 0) {
                        showSharePanel(subject);
                        statusDiv.className = "p-4 rounded-xl text-center font-medium bg-emerald-100 text-emerald-800";
                        statusDiv.innerHTML = `Google Sheets'dan ${resData.questions.length} ta savol yuklandi.`;
                    } else {
                        statusDiv.className = "p-4 rounded-xl text-center font-medium bg-red-100 text-red-800";
                        statusDiv.innerHTML = `Tayyor savollar topilmadi.`;
                    }
                } catch (e) { statusDiv.innerText = "Ulanish xatosi."; }
                return;
            }

            // Автономный генератор вопросов без внешних ключей
            try {
                let questions = [];
                for(let i=1; i<=count; i++) {
                    questions.push({
                        question: `${subject} fanidan "${topic}" mavzusi bo'yicha maxsus test savoli #${i}?`,
                        a: "Noto'g'ri javob varianti (A)", 
                        b: "To'g'ri javob varianti (B)", 
                        c: "Noto'g'ri javob varianti (C)", 
                        d: "Noto'g'ri javob varianti (D)",
                        answer: "B", 
                        topic: topic
                    });
                }

                await fetch(APPS_SCRIPT_URL, {
                    method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type: 'save_questions', subject, questions })
                });

                statusDiv.className = "p-4 rounded-xl text-center font-medium bg-emerald-100 text-emerald-800";
                statusDiv.innerHTML = `Yangi test muvaffaqiyatli saqlandi!`;
                showSharePanel(subject);
            } catch (err) {
                statusDiv.className = "p-4 rounded-xl text-center font-medium bg-red-100 text-red-800";
                statusDiv.innerText = "Xatolik yuz berdi.";
            }
        }

        function showSharePanel(subject) {
            document.getElementById('share-panel').classList.remove('hidden');
            const link = `${window.location.origin}${window.location.pathname}?subject=${encodeURIComponent(subject)}`;
            document.getElementById('share-link').href = link; document.getElementById('share-link').innerText = link;
            const qrDiv = document.getElementById('qrcode'); qrDiv.innerHTML = '';
            new QRCode(qrDiv, { text: link, width: 128, height: 128 });
        }

        async function loadQuizForStudent(subject) {
            switchScreen('screen-quiz', 'O\'quvchi');
            document.getElementById('student-name-display').innerText = sessionData.name;
            document.getElementById('student-subject-display').innerText = subject;
            document.getElementById('question-text').innerText = "Yuklanmoqda...";

            try {
                const response = await fetch(`${APPS_SCRIPT_URL}?type=get_questions&subject=${encodeURIComponent(subject)}`);
                const resData = await response.json();
                currentQuestions = resData.questions;
                if(!currentQuestions?.length) { alert('Test topilmadi!'); location.reload(); return; }
                currentQuestionIdx = 0; score = 0; renderQuestion();
            } catch (e) { alert('Xatolik.'); }
        }

        function renderQuestion() {
            document.getElementById('btn-next').classList.add('hidden');
            const q = currentQuestions[currentQuestionIdx];
            document.getElementById('quiz-progress').innerText = `${currentQuestionIdx + 1}/${currentQuestions.length}`;
            document.getElementById('question-text').innerText = q.question;

            const container = document.getElementById('answers-container'); container.innerHTML = '';
            [{k:'A',t:q.a},{k:'B',t:q.b},{k:'C',t:q.c},{k:'D',t:q.d}].forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-4 border border-gray-200 rounded-xl hover:bg-gray-50 font-medium cursor-pointer bg-white flex items-center justify-between option-btn";
                btn.innerHTML = `<span><b>${opt.k}:</b> ${opt.t}</span>`;
                btn.onclick = () => handleAnswer(btn, opt.k, q.answer.toUpperCase());
                container.appendChild(btn);
            });
        }

        function handleAnswer(selectedBtn, chosenKey, correctKey) {
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(b => b.disabled = true);
            if (chosenKey === correctKey) {
                selectedBtn.classList.add('correct'); score++;
            } else {
                selectedBtn.classList.add('wrong');
                buttons.forEach(b => { if(b.innerText.startsWith(correctKey + ':')) b.classList.add('correct'); });
            }
            document.getElementById('btn-next').classList.remove('hidden');
        }

        function nextQuestion() {
            currentQuestionIdx++;
            if (currentQuestionIdx < currentQuestions.length) renderQuestion(); else finishQuiz();
        }

        async function finishQuiz() {
            switchScreen('screen-results', 'Natija');
            const pct = Math.round((score / currentQuestions.length) * 100);
            document.getElementById('res-score').innerText = score;
            document.getElementById('res-total').innerText = currentQuestions.length;
            document.getElementById('res-percent').innerText = pct;

            await fetch(APPS_SCRIPT_URL, {
                method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ type: 'save_result', name: sessionData.name, group: sessionData.group, teacher: sessionData.teacher, subject: sessionData.subject, score, total: currentQuestions.length, percent: pct })
            });
        }
    </script>
</body>
</html>
