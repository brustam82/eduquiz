<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduQuiz — Bilim platformasi</title>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',system-ui,sans-serif}
body{background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;color:#1a1a2e}
.wrap{max-width:760px;margin:0 auto;padding:20px}
.card{background:#fff;border-radius:20px;padding:28px;box-shadow:0 12px 40px rgba(0,0,0,.2);margin-bottom:18px}
h1{text-align:center;color:#fff;margin:18px 0;font-size:30px}
h2{color:#5a3d8a;margin-bottom:16px}
.btn{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:0;padding:14px 22px;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;width:100%;margin-top:10px;transition:.2s}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(102,126,234,.4)}
.btn.alt{background:#f0eeff;color:#5a3d8a}
input,select,textarea{width:100%;padding:12px;border:2px solid #e0e0f0;border-radius:10px;font-size:15px;margin-bottom:12px}
input:focus,select:focus,textarea:focus{outline:0;border-color:#764ba2}
label{display:block;font-weight:600;margin-bottom:6px;font-size:14px;color:#444}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.role{background:#f0eeff;border-radius:16px;padding:30px 16px;text-align:center;cursor:pointer;border:3px solid transparent;transition:.2s}
.role:hover{border-color:#764ba2;transform:translateY(-3px)}
.role .ico{font-size:48px}
.role .t{font-weight:700;margin-top:8px;font-size:18px;color:#5a3d8a}
.hidden{display:none}
.q-card{background:#faf9ff;border-radius:14px;padding:20px;margin-bottom:14px}
.q-num{color:#764ba2;font-weight:700;font-size:13px}
.q-text{font-size:18px;font-weight:600;margin:8px 0 14px}
.opt{display:block;background:#fff;border:2px solid #e0e0f0;border-radius:10px;padding:13px;margin-bottom:9px;cursor:pointer;transition:.15s}
.opt:hover{border-color:#764ba2;background:#f5f3ff}
.opt.sel{border-color:#764ba2;background:#ede9ff}
.opt.correct{border-color:#22c55e;background:#dcfce7}
.opt.wrong{border-color:#ef4444;background:#fee2e2}
.msg{padding:12px;border-radius:10px;margin:10px 0;font-weight:600;text-align:center}
.msg.err{background:#fee2e2;color:#b91c1c}
.msg.ok{background:#dcfce7;color:#15803d}
.msg.load{background:#fef9c3;color:#854d0e}
.row{display:flex;gap:12px}
.row>*{flex:1}
.back{background:none;border:0;color:#764ba2;cursor:pointer;font-weight:600;margin-bottom:14px;font-size:14px}
.result-big{font-size:54px;font-weight:800;text-align:center;color:#764ba2}
#qrbox{display:flex;justify-content:center;margin:16px 0}
.spin{display:inline-block;width:18px;height:18px;border:3px solid #fff;border-top-color:transparent;border-radius:50%;animation:sp 1s linear infinite;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}
.fade{animation:fd .4s ease}
@keyframes fd{from{opacity:0;transform:translateY(10px)}to{opacity:1}}
.bar{height:10px;background:#e0e0f0;border-radius:6px;overflow:hidden;margin-bottom:16px}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,#667eea,#764ba2);transition:.3s}
small{color:#888}
</style>
</head>
<body>
<div class="wrap">
<h1>🎓 EduQuiz</h1>

<!-- ВЫБОР РОЛИ -->
<div id="screen-home" class="card fade">
  <h2>Войдите в систему</h2>
  <div class="role-grid">
    <div class="role" onclick="show('login-teacher')">
      <div class="ico">👨‍🏫</div><div class="t">Учитель</div>
    </div>
    <div class="role" onclick="show('login-student')">
      <div class="ico">👨‍🎓</div><div class="t">Ученик</div>
    </div>
  </div>
</div>

<!-- ВХОД УЧИТЕЛЬ -->
<div id="screen-login-teacher" class="card hidden fade">
  <button class="back" onclick="show('home')">← Назад</button>
  <h2>Вход учителя</h2>
  <label>PIN-код учителя</label>
  <input id="tpin" placeholder="TEACH-4821" value="TEACH-4821">
  <small>Демо-PIN: TEACH-4821</small>
  <button class="btn" onclick="loginTeacher()">Войти</button>
</div>

<!-- ВХОД УЧЕНИК -->
<div id="screen-login-student" class="card hidden fade">
  <button class="back" onclick="show('home')">← Назад</button>
  <h2>Вход ученика</h2>
  <label>Имя и фамилия</label>
  <input id="sname" placeholder="Иван Иванов">
  <label>Код класса</label>
  <input id="scode" placeholder="Например: Биология">
  <small>Код выдаёт учитель (= название предмета/теста)</small>
  <button class="btn" onclick="loginStudent()">Начать тест</button>
</div>

<!-- ПАНЕЛЬ УЧИТЕЛЯ -->
<div id="screen-teacher" class="card hidden fade">
  <button class="back" onclick="logout()">← Выйти</button>
  <h2>🛠 Панель учителя</h2>
  <label>Предмет / Категория</label>
  <select id="gsubject">
    <optgroup label="Школьные предметы">
      <option>Математика</option><option>Физика</option><option>Химия</option>
      <option>Биология</option><option>История</option><option>География</option>
      <option>Литература</option><option>Английский язык</option><option>Информатика</option>
    </optgroup>
    <optgroup label="Профессии">
      <option>Программирование</option><option>Электрика</option><option>Строительство</option>
      <option>Бухгалтерия</option><option>Кулинария</option><option>Автодело</option>
      <option>Медицина (база)</option>
    </optgroup>
  </select>
  <label>Тема</label>
  <input id="gtopic" placeholder="Например: Фотосинтез">
  <div class="row">
    <div><label>Кол-во вопросов</label><input id="gcount" type="number" value="5" min="1" max="20"></div>
    <div><label>Сложность</label>
      <select id="glevel"><option>Лёгкая</option><option selected>Средняя</option><option>Сложная</option></select>
    </div>
  </div>
  <label>Язык вопросов</label>
  <select id="glang"><option>Русский</option><option>O'zbekcha</option><option>English</option></select>
  <button class="btn" onclick="generate(false)">✨ Сгенерировать новый тест</button>
  <button class="btn alt" onclick="loadExisting()">📂 Использовать существующий</button>
  <div id="gmsg"></div>
  <div id="gpreview"></div>
  <div id="qrsection" class="hidden">
    <h2 style="margin-top:20px">🔗 Доступ для учеников</h2>
    <p>Код класса: <b id="classcode"></b></p>
    <div id="qrbox"></div>
    <small>Ученики сканируют QR или вводят код вручную</small>
  </div>
</div>

<!-- ТЕСТ (УЧЕНИК) -->
<div id="screen-quiz" class="card hidden fade">
  <div class="bar"><i id="progbar" style="width:0%"></i></div>
  <div id="quizbody"></div>
</div>

<!-- РЕЗУЛЬТАТ -->
<div id="screen-result" class="card hidden fade">
  <h2 style="text-align:center">Результат</h2>
  <div class="result-big" id="rscore"></div>
  <p style="text-align:center;font-size:18px" id="rtext"></p>
  <button class="btn" onclick="location.reload()">🏠 На главную</button>
</div>

</div>
<script>
/* ===== КОНФИГ ===== */
const API_URL = "https://script.google.com/macros/s/AKfycby2XjM5-xn0gy7M-JdhyUgiKGZ2R7xpNOJ0CaYIFrsaHeuKXw_xH7USdd07HoT4rVXG/exec";
const GEMINI_KEY = "ВСТАВЬ_СЮДА_КЛЮЧ_AIza";   // ← замени на ключ с aistudio.google.com
const TEACHER_PIN = "TEACH-4821";

let state = {questions:[], idx:0, answers:[], subject:"", student:""};

/* ===== НАВИГАЦИЯ ===== */
function show(id){
  document.querySelectorAll('.card').forEach(c=>c.classList.add('hidden'));
  document.getElementById('screen-'+id).classList.remove('hidden');
}
function logout(){location.reload()}

/* ===== ВХОД ===== */
function loginTeacher(){
  if(document.getElementById('tpin').value.trim()===TEACHER_PIN){show('teacher')}
  else alert('Неверный PIN');
}
function loginStudent(){
  const n=document.getElementById('sname').value.trim();
  const c=document.getElementById('scode').value.trim();
  if(!n||!c){alert('Заполните имя и код');return}
  state.student=n; state.subject=c;
  startQuizForStudent(c);
}

/* QR авто-вход по ссылке ?class=Биология */
window.addEventListener('load',()=>{
  const p=new URLSearchParams(location.search).get('class');
  if(p){show('login-student');document.getElementById('scode').value=p;}
});

/* ===== GEMINI ГЕНЕРАЦИЯ ===== */
async function generate(){
  const subject=document.getElementById('gsubject').value;
  const topic=document.getElementById('gtopic').value.trim()||subject;
  const count=document.getElementById('gcount').value;
  const level=document.getElementById('glevel').value;
  const lang=document.getElementById('glang').value;
  const msg=document.getElementById('gmsg');

  if(GEMINI_KEY.startsWith("ВСТАВЬ")){msg.innerHTML='<div class="msg err">⚠️ Вставьте Gemini API-ключ в код (строка GEMINI_KEY)</div>';return}
  msg.innerHTML='<div class="msg load"><span class="spin"></span> Генерация через Gemini...</div>';

  const prompt=`Сгенерируй ${count} тестовых вопросов по предмету "${subject}", тема "${topic}", сложность ${level}, язык ${lang}. У каждого вопроса 4 варианта (a,b,c,d) и один правильный. Верни ТОЛЬКО валидный JSON массив без markdown: [{"question":"...","a":"...","b":"...","c":"...","d":"...","answer":"a","topic":"${topic}"}]`;

  try{
    const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})
    });
    const d=await r.json();
    let txt=d.candidates[0].content.parts[0].text.replace(/```json|```/g,'').trim();
    const questions=JSON.parse(txt);
    state.questions=questions;
    previewQuestions(questions);
    msg.innerHTML='<div class="msg load"><span class="spin"></span> Сохраняю в Google Sheets...</div>';
    await fetch(API_URL,{method:'POST',body:JSON.stringify({type:'save_questions',subject,questions})});
    msg.innerHTML='<div class="msg ok">✅ Готово! '+questions.length+' вопросов сохранено</div>';
    showQR(subject);
  }catch(e){
    msg.innerHTML='<div class="msg err">Ошибка: '+e.message+'. Проверьте ключ Gemini.</div>';
  }
}

async function loadExisting(){
  const subject=document.getElementById('gsubject').value;
  const msg=document.getElementById('gmsg');
  msg.innerHTML='<div class="msg load"><span class="spin"></span> Загрузка из таблицы...</div>';
  try{
    const r=await fetch(API_URL,{method:'POST',body:JSON.stringify({type:'get_questions',subject})});
    const d=await r.json();
    if(!d.questions||!d.questions.length){msg.innerHTML='<div class="msg err">Нет сохранённых тестов по этому предмету</div>';return}
    state.questions=d.questions;
    previewQuestions(d.questions);
    msg.innerHTML='<div class="msg ok">✅ Загружено '+d.questions.length+' вопросов</div>';
    showQR(subject);
  }catch(e){msg.innerHTML='<div class="msg err">Ошибка: '+e.message+'</div>'}
}

function previewQuestions(qs){
  let h='<h2 style="margin-top:18px">Предпросмотр</h2>';
  qs.forEach((q,i)=>{h+='<div class="q-card"><div class="q-num">Вопрос '+(i+1)+'</div><div class="q-text">'+q.question+'</div><small>✓ Ответ: '+q.answer.toUpperCase()+'</small></div>'});
  document.getElementById('gpreview').innerHTML=h;
}

function showQR(subject){
  document.getElementById('qrsection').classList.remove('hidden');
  document.getElementById('classcode').textContent=subject;
  const link=location.origin+location.pathname+'?class='+encodeURIComponent(subject);
  document.getElementById('qrbox').innerHTML='';
  new QRCode(document.getElementById('qrbox'),{text:link,width:170,height:170});
}

/* ===== ТЕСТ ДЛЯ УЧЕНИКА ===== */
async function startQuizForStudent(subject){
  show('quiz');
  document.getElementById('quizbody').innerHTML='<div class="msg load"><span class="spin"></span> Загрузка теста...</div>';
  try{
    const r=await fetch(API_URL,{method:'POST',body:JSON.stringify({type:'get_questions',subject})});
    const d=await r.json();
    if(!d.questions||!d.questions.length){document.getElementById('quizbody').innerHTML='<div class="msg err">Тест не найден. Проверьте код класса.</div>';return}
    state.questions=d.questions; state.idx=0; state.answers=[];
    renderQuestion();
  }catch(e){document.getElementById('quizbody').innerHTML='<div class="msg err">Ошибка загрузки</div>'}
}

function renderQuestion(){
  const q=state.questions[state.idx];
  const n=state.questions.length;
  document.getElementById('progbar').style.width=((state.idx)/n*100)+'%';
  let h='<div class="q-num">Вопрос '+(state.idx+1)+' из '+n+'</div>';
  h+='<div class="q-text">'+q.question+'</div>';
  ['a','b','c','d'].forEach(k=>{h+='<div class="opt" data-k="'+k+'" onclick="pick(this,\''+k+'\')"><b>'+k.toUpperCase()+'.</b> '+q[k]+'</div>'});
  document.getElementById('quizbody').innerHTML=h;
}

function pick(el,k){
  const q=state.questions[state.idx];
  document.querySelectorAll('.opt').forEach(o=>o.style.pointerEvents='none');
  if(k===q.answer.toLowerCase()){el.classList.add('correct');state.answers.push(1)}
  else{el.classList.add('wrong');state.answers.push(0);
    document.querySelector('.opt[data-k="'+q.answer.toLowerCase()+'"]').classList.add('correct')}
  setTimeout(next,900);
}

function next(){
  state.idx++;
  if(state.idx<state.questions.length){renderQuestion()}
  else finishQuiz();
}

async function finishQuiz(){
  const score=state.answers.reduce((a,b)=>a+b,0);
  const total=state.questions.length;
  const pct=Math.round(score/total*100);
  show('result');
  document.getElementById('rscore').textContent=score+' / '+total;
  let emo=pct>=80?'🏆 Отлично!':pct>=50?'👍 Хорошо!':'📚 Нужно повторить';
  document.getElementById('rtext').textContent=emo+' ('+pct+'%)';
  // сохраняем результат
  fetch(API_URL,{method:'POST',body:JSON.stringify({type:'save_result',name:state.student,group:state.subject,teacher:TEACHER_PIN,subject:state.subject,score,total,percent:pct})});
}
</script>
</body>
</html>
